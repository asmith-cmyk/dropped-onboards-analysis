<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Onboarding Lifecycle Dashboard</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --line: #d8d9d2;
      --text: #172026;
      --muted: #5d6770;
      --teal: #0f766e;
      --blue: #2563eb;
      --amber: #b45309;
      --rose: #be123c;
      --ink-soft: #eef0ec;
      --shadow: 0 1px 2px rgba(23, 32, 38, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      padding: 18px 28px 16px;
    }
    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
      font-weight: 720;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 5px;
      font-size: 13px;
    }
    main {
      padding: 20px 28px 32px;
      max-width: 1500px;
      margin: 0 auto;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(240px, 2fr) repeat(4, minmax(140px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
      min-height: 38px;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .tile, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .tile {
      padding: 12px 13px;
      min-height: 82px;
    }
    .tile .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .tile .value {
      margin-top: 7px;
      font-size: 28px;
      line-height: 1;
      font-weight: 760;
      letter-spacing: 0;
    }
    .tile .note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .panel {
      padding: 14px;
      min-height: 285px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .panel-header span {
      color: var(--muted);
      font-size: 12px;
    }
    .bars {
      display: grid;
      gap: 8px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 190px) 1fr 72px;
      gap: 10px;
      align-items: center;
    }
    .bar-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #25313a;
      font-size: 12px;
    }
    .bar-track {
      background: var(--ink-soft);
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      min-width: 2px;
      background: var(--teal);
      border-radius: 999px;
    }
    .bar-fill.blue { background: var(--blue); }
    .bar-fill.amber { background: var(--amber); }
    .bar-fill.rose { background: var(--rose); }
    .bar-value {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }
    .table-panel {
      padding: 0;
      overflow: hidden;
    }
    .table-header {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .table-wrap {
      overflow: auto;
      max-height: 560px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #eceee8;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #fbfbf9;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .sort-button {
      border: 0;
      background: transparent;
      color: inherit;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      min-height: 0;
      font: inherit;
      font-weight: inherit;
      text-transform: inherit;
      cursor: pointer;
    }
    .sort-indicator {
      color: var(--teal);
      display: inline-block;
      min-width: 8px;
    }
    td {
      font-size: 12px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      background: #edf7f4;
      color: #0f5f58;
      white-space: nowrap;
    }
    .status.no {
      background: #f3f4f0;
      color: #687078;
    }
    .status.warn {
      background: #fff4df;
      color: #8a4b08;
    }
    .empty {
      color: var(--muted);
      padding: 18px 0;
      font-size: 13px;
    }
    @media (max-width: 1100px) {
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .controls, .kpis { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 110px 1fr 56px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <div>
        <h1>Onboarding Lifecycle Dashboard</h1>
        <div class="subtitle">Master lifecycle model · 898 dropped onboarding creators · Generated 2026-05-20 12:47</div>
      </div>
      <div class="subtitle">Source: outputs/master_creator_lifecycle.csv</div>
    </div>
  </header>

  <main>
    <section class="controls" aria-label="Filters">
      <label>Search
        <input id="search" type="search" placeholder="Creator, lead, owner, reason">
      </label>
      <label>Service Level
        <select id="service"></select>
      </label>
      <label>Vertical
        <select id="vertical"></select>
      </label>
      <label>Owner
        <select id="owner"></select>
      </label>
      <label>Cadence
        <select id="cadence"></select>
      </label>
    </section>

    <section class="kpis" id="kpis"></section>

    <section class="grid">
      <div class="panel">
        <div class="panel-header"><h2>Service Level</h2><span id="service-count"></span></div>
        <div class="bars" id="service-bars"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Cancellation Reasons</h2><span id="reason-count"></span></div>
        <div class="bars" id="reason-bars"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Creator Growth</h2><span id="cg-count"></span></div>
        <div class="bars" id="cg-bars"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Previous Ad Network</h2><span id="network-count"></span></div>
        <div class="bars" id="network-bars"></div>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-header">
        <h2>Master Lifecycle Rows</h2>
        <span class="subtitle" id="row-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button class="sort-button" type="button" data-sort="creator_project_name">Creator <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="lead">Lead <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="service_level">Service <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="vertical">Vertical <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="previous_ad_network">Network <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="onboarding_owner">Owner <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="dropped_date">Dropped <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="reason">Reason <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="macro_cadence">Cadence <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="cg_involvement">CG Involvement <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="onboarding_call_offered">Call <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="salesloft_meeting_detected">Salesloft <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="slack_intervention_detected">Slack <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="returned_date">Returned <span class="sort-indicator"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="outcome">Outcome <span class="sort-indicator"></span></button></th>
            </tr>
          </thead>
          <tbody id="creator-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

    populateSelect('owner', 'onboarding_owner');
    populateSelect('cadence', 'macro_cadence', cadenceValue);
    Object.values(fields).forEach(control => control.addEventListener('input', render));
    Object.values(fields).forEach(control => control.addEventListener('change', render));
    document.querySelectorAll('.sort-button').forEach(button => {
      button.addEventListener('click', () => {
        const key = button.dataset.sort;
        if (sortState.key === key) {
          sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
        } else {
          sortState.key = key;
          sortState.direction = 'asc';
        }
        render();
      });
    });
    render();
  </script>
</body>
</html>
